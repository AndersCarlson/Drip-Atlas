<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="shg" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="106" cy="108" rx="60" ry="56" fill="#607820" opacity="0.12" filter="url(#shg)"/>

  <!-- Base ground wash -->
  <ellipse cx="100" cy="100" rx="66" ry="62" fill="#ddf0aa" opacity="0.50"/>

  <!-- 12 grass blades at 30° intervals, all rotated from a base blade pointing up -->
  <!-- Base blade shape: thin leaf from (0,-20) to (0,-72), ~5px wide -->
  <!-- Each has a small ellipse tip cluster and a slender blade body -->
  <g transform="translate(100,100)">

    <!-- 0° — straight up -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#7ab030" opacity="0.72"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#6aa020" opacity="0.80"/>
    <ellipse cx="-2" cy="-62" rx="3" ry="2.5" fill="#96c840" opacity="0.50"/>

    <!-- 30° -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#88ba38" opacity="0.72" transform="rotate(30)"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#78aa28" opacity="0.80" transform="rotate(30)"/>

    <!-- 60° -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#7ab030" opacity="0.72" transform="rotate(60)"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#6aa020" opacity="0.80" transform="rotate(60)"/>
    <ellipse cx="-2" cy="-62" rx="3" ry="2.5" fill="#96c840" opacity="0.48" transform="rotate(60)"/>

    <!-- 90° — right -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#88ba38" opacity="0.72" transform="rotate(90)"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#78aa28" opacity="0.80" transform="rotate(90)"/>

    <!-- 120° -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#7ab030" opacity="0.72" transform="rotate(120)"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#6aa020" opacity="0.80" transform="rotate(120)"/>
    <ellipse cx="-2" cy="-62" rx="3" ry="2.5" fill="#96c840" opacity="0.46" transform="rotate(120)"/>

    <!-- 150° -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#88ba38" opacity="0.72" transform="rotate(150)"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#78aa28" opacity="0.80" transform="rotate(150)"/>

    <!-- 180° — straight down -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#7ab030" opacity="0.72" transform="rotate(180)"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#6aa020" opacity="0.80" transform="rotate(180)"/>
    <ellipse cx="-2" cy="-62" rx="3" ry="2.5" fill="#96c840" opacity="0.46" transform="rotate(180)"/>

    <!-- 210° -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#88ba38" opacity="0.72" transform="rotate(210)"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#78aa28" opacity="0.80" transform="rotate(210)"/>

    <!-- 240° -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#7ab030" opacity="0.72" transform="rotate(240)"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#6aa020" opacity="0.80" transform="rotate(240)"/>
    <ellipse cx="-2" cy="-62" rx="3" ry="2.5" fill="#96c840" opacity="0.46" transform="rotate(240)"/>

    <!-- 270° — left -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#88ba38" opacity="0.72" transform="rotate(270)"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#78aa28" opacity="0.80" transform="rotate(270)"/>

    <!-- 300° -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#7ab030" opacity="0.72" transform="rotate(300)"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#6aa020" opacity="0.80" transform="rotate(300)"/>
    <ellipse cx="-2" cy="-62" rx="3" ry="2.5" fill="#96c840" opacity="0.46" transform="rotate(300)"/>

    <!-- 330° -->
    <path d="M-3,-20 Q-5,-46 0,-70 Q5,-46 3,-20 Z" fill="#88ba38" opacity="0.72" transform="rotate(330)"/>
    <ellipse cx="0" cy="-66" rx="7" ry="6" fill="#78aa28" opacity="0.80" transform="rotate(330)"/>

  </g>

  <!-- Center stem base -->
  <circle cx="100" cy="100" r="11" fill="#4a7c18" opacity="0.80"/>
  <circle cx="100" cy="100" r="5"  fill="#2e5008" opacity="0.70"/>
</svg>
