<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Organic edge warp -->
    <filter id="tw" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="3" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="tc">
      <circle cx="100" cy="100" r="90"/>
    </clipPath>
  </defs>

  <!-- ── BASE ── dark ground fill -->
  <circle cx="100" cy="100" r="90" fill="#1a2e0c"/>

  <!-- ── SPOKE CHANNELS ── dark branches between lobe clusters -->
  <g clip-path="url(#tc)" stroke="#111e07" stroke-linecap="round" fill="none">
    <line x1="100" y1="100" x2="100"  y2="14"  stroke-width="5" opacity="0.80"/>
    <line x1="100" y1="100" x2="151"  y2="37"  stroke-width="4" opacity="0.75"/>
    <line x1="100" y1="100" x2="178"  y2="90"  stroke-width="4" opacity="0.75"/>
    <line x1="100" y1="100" x2="158"  y2="152" stroke-width="4" opacity="0.75"/>
    <line x1="100" y1="100" x2="100"  y2="182" stroke-width="5" opacity="0.80"/>
    <line x1="100" y1="100" x2="44"   y2="158" stroke-width="4" opacity="0.75"/>
    <line x1="100" y1="100" x2="20"   y2="96"  stroke-width="4" opacity="0.75"/>
    <line x1="100" y1="100" x2="46"   y2="38"  stroke-width="4" opacity="0.75"/>
    <!-- secondary -->
    <line x1="100" y1="100" x2="128"  y2="58"  stroke-width="2.5" opacity="0.50"/>
    <line x1="100" y1="100" x2="134"  y2="128" stroke-width="2.5" opacity="0.50"/>
    <line x1="100" y1="100" x2="74"   y2="134" stroke-width="2.5" opacity="0.50"/>
    <line x1="100" y1="100" x2="68"   y2="62"  stroke-width="2.5" opacity="0.50"/>
  </g>

  <!-- ── CANOPY FILL ── lobe blobs sitting between spokes, mid-dark green -->
  <g clip-path="url(#tc)">
    <!-- Outer lobe ring: 8 lobes -->
    <circle cx="100"  cy="26"  r="30" fill="#3a6020" opacity="0.88"/>
    <circle cx="152"  cy="47"  r="28" fill="#2e5418" opacity="0.88"/>
    <circle cx="174"  cy="98"  r="28" fill="#3a6020" opacity="0.88"/>
    <circle cx="154"  cy="152" r="28" fill="#2e5418" opacity="0.88"/>
    <circle cx="100"  cy="174" r="30" fill="#3a6020" opacity="0.88"/>
    <circle cx="46"   cy="152" r="28" fill="#2e5418" opacity="0.88"/>
    <circle cx="26"   cy="98"  r="28" fill="#3a6020" opacity="0.88"/>
    <circle cx="48"   cy="46"  r="28" fill="#2e5418" opacity="0.88"/>

    <!-- Mid-ring infill — blobs between outer lobes -->
    <circle cx="134"  cy="34"  r="20" fill="#344e18" opacity="0.70"/>
    <circle cx="164"  cy="74"  r="20" fill="#2e4a14" opacity="0.70"/>
    <circle cx="162"  cy="126" r="20" fill="#344e18" opacity="0.70"/>
    <circle cx="126"  cy="164" r="20" fill="#2e4a14" opacity="0.70"/>
    <circle cx="74"   cy="164" r="20" fill="#344e18" opacity="0.70"/>
    <circle cx="38"   cy="128" r="20" fill="#2e4a14" opacity="0.70"/>
    <circle cx="36"   cy="72"  r="20" fill="#344e18" opacity="0.70"/>
    <circle cx="68"   cy="34"  r="20" fill="#2e4a14" opacity="0.70"/>

    <!-- Inner ring -->
    <circle cx="100"  cy="58"  r="22" fill="#3a5c1c" opacity="0.80"/>
    <circle cx="136"  cy="78"  r="20" fill="#344e18" opacity="0.78"/>
    <circle cx="136"  cy="122" r="20" fill="#3a5c1c" opacity="0.78"/>
    <circle cx="100"  cy="142" r="22" fill="#344e18" opacity="0.80"/>
    <circle cx="64"   cy="122" r="20" fill="#3a5c1c" opacity="0.78"/>
    <circle cx="64"   cy="78"  r="20" fill="#344e18" opacity="0.78"/>

    <!-- Highlight caps on some outer lobes (lighter green, upper-left catch) -->
    <circle cx="94"   cy="20"  r="13" fill="#4e7a28" opacity="0.60"/>
    <circle cx="44"   cy="42"  r="12" fill="#4e7a28" opacity="0.52"/>
    <circle cx="22"   cy="92"  r="12" fill="#486e24" opacity="0.50"/>
    <circle cx="148"  cy="42"  r="11" fill="#446820" opacity="0.45"/>

    <!-- Texture scatter — small dark blobs for organic density -->
    <circle cx="82"  cy="38"  r="8"  fill="#22380e" opacity="0.60"/>
    <circle cx="118" cy="34"  r="7"  fill="#1e3210" opacity="0.55"/>
    <circle cx="152" cy="68"  r="8"  fill="#22380e" opacity="0.55"/>
    <circle cx="162" cy="112" r="7"  fill="#1e3210" opacity="0.55"/>
    <circle cx="140" cy="162" r="8"  fill="#22380e" opacity="0.55"/>
    <circle cx="64"  cy="166" r="7"  fill="#1e3210" opacity="0.55"/>
    <circle cx="30"  cy="120" r="8"  fill="#22380e" opacity="0.55"/>
    <circle cx="36"  cy="56"  r="7"  fill="#1e3210" opacity="0.55"/>
    <circle cx="112" cy="78"  r="7"  fill="#22380e" opacity="0.45"/>
    <circle cx="90"  cy="128" r="7"  fill="#1e3210" opacity="0.45"/>
    <circle cx="128" cy="118" r="6"  fill="#22380e" opacity="0.40"/>
    <circle cx="76"  cy="76"  r="6"  fill="#1e3210" opacity="0.40"/>
  </g>

  <!-- ── DARK CENTER TRUNK ── -->
  <circle cx="100" cy="100" r="14" fill="#0e1e06" opacity="0.85"/>
  <circle cx="100" cy="100" r="7"  fill="#080e04" opacity="0.90"/>

  <!-- ── ORGANIC EDGE warp pass (gives irregular silhouette) ── -->
  <circle cx="100" cy="100" r="90" fill="none" filter="url(#tw)"
          stroke="#0a1604" stroke-width="10" opacity="0.55"/>
</svg>
