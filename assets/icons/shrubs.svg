<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="sw" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.07" numOctaves="3" seed="12" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="sc">
      <circle cx="100" cy="100" r="78"/>
    </clipPath>
  </defs>

  <!-- ── BASE ── -->
  <circle cx="100" cy="100" r="78" fill="#182a0a"/>

  <!-- ── SPOKE CHANNELS ── -->
  <g clip-path="url(#sc)" stroke="#0e1c06" stroke-linecap="round" fill="none">
    <line x1="100" y1="100" x2="100" y2="28"  stroke-width="4.5" opacity="0.80"/>
    <line x1="100" y1="100" x2="146" y2="46"  stroke-width="4"   opacity="0.75"/>
    <line x1="100" y1="100" x2="168" y2="98"  stroke-width="4"   opacity="0.75"/>
    <line x1="100" y1="100" x2="148" y2="150" stroke-width="4"   opacity="0.75"/>
    <line x1="100" y1="100" x2="100" y2="170" stroke-width="4.5" opacity="0.80"/>
    <line x1="100" y1="100" x2="52"  y2="150" stroke-width="4"   opacity="0.75"/>
    <line x1="100" y1="100" x2="32"  y2="98"  stroke-width="4"   opacity="0.75"/>
    <line x1="100" y1="100" x2="54"  y2="46"  stroke-width="4"   opacity="0.75"/>
    <!-- sub-spokes -->
    <line x1="100" y1="100" x2="124" y2="62"  stroke-width="2"   opacity="0.45"/>
    <line x1="100" y1="100" x2="130" y2="130" stroke-width="2"   opacity="0.45"/>
    <line x1="100" y1="100" x2="72"  y2="132" stroke-width="2"   opacity="0.45"/>
    <line x1="100" y1="100" x2="70"  y2="64"  stroke-width="2"   opacity="0.45"/>
  </g>

  <!-- ── CANOPY LOBES ── compact, uniform dark green -->
  <g clip-path="url(#sc)">
    <!-- outer ring -->
    <circle cx="100" cy="36"  r="26" fill="#304e18" opacity="0.90"/>
    <circle cx="144" cy="54"  r="24" fill="#2a4614" opacity="0.90"/>
    <circle cx="164" cy="98"  r="24" fill="#304e18" opacity="0.90"/>
    <circle cx="146" cy="148" r="24" fill="#2a4614" opacity="0.90"/>
    <circle cx="100" cy="164" r="26" fill="#304e18" opacity="0.90"/>
    <circle cx="54"  cy="148" r="24" fill="#2a4614" opacity="0.90"/>
    <circle cx="36"  cy="98"  r="24" fill="#304e18" opacity="0.90"/>
    <circle cx="56"  cy="54"  r="24" fill="#2a4614" opacity="0.90"/>

    <!-- infill between lobes (tighter) -->
    <circle cx="128" cy="42"  r="18" fill="#283e12" opacity="0.75"/>
    <circle cx="156" cy="72"  r="18" fill="#243810" opacity="0.75"/>
    <circle cx="154" cy="126" r="18" fill="#283e12" opacity="0.75"/>
    <circle cx="124" cy="158" r="18" fill="#243810" opacity="0.75"/>
    <circle cx="76"  cy="158" r="18" fill="#283e12" opacity="0.75"/>
    <circle cx="46"  cy="126" r="18" fill="#243810" opacity="0.75"/>
    <circle cx="44"  cy="72"  r="18" fill="#283e12" opacity="0.75"/>
    <circle cx="74"  cy="42"  r="18" fill="#243810" opacity="0.75"/>

    <!-- inner fill -->
    <circle cx="100" cy="62"  r="20" fill="#2e4a16" opacity="0.82"/>
    <circle cx="130" cy="82"  r="18" fill="#283e12" opacity="0.80"/>
    <circle cx="128" cy="118" r="18" fill="#2e4a16" opacity="0.80"/>
    <circle cx="100" cy="138" r="20" fill="#283e12" opacity="0.82"/>
    <circle cx="70"  cy="118" r="18" fill="#2e4a16" opacity="0.80"/>
    <circle cx="70"  cy="82"  r="18" fill="#283e12" opacity="0.80"/>

    <!-- Highlight caps -->
    <circle cx="94"  cy="30"  r="11" fill="#406020" opacity="0.55"/>
    <circle cx="50"  cy="50"  r="10" fill="#3c5a1c" opacity="0.48"/>
    <circle cx="30"  cy="92"  r="10" fill="#406020" opacity="0.45"/>

    <!-- texture scatter -->
    <circle cx="80"  cy="44"  r="7"  fill="#1c2e0c" opacity="0.60"/>
    <circle cx="120" cy="40"  r="6"  fill="#182808" opacity="0.55"/>
    <circle cx="150" cy="66"  r="7"  fill="#1c2e0c" opacity="0.55"/>
    <circle cx="158" cy="114" r="6"  fill="#182808" opacity="0.55"/>
    <circle cx="134" cy="158" r="7"  fill="#1c2e0c" opacity="0.55"/>
    <circle cx="62"  cy="160" r="6"  fill="#182808" opacity="0.55"/>
    <circle cx="38"  cy="116" r="7"  fill="#1c2e0c" opacity="0.55"/>
    <circle cx="44"  cy="64"  r="6"  fill="#182808" opacity="0.55"/>
    <circle cx="108" cy="76"  r="6"  fill="#1c2e0c" opacity="0.42"/>
    <circle cx="94"  cy="124" r="6"  fill="#182808" opacity="0.42"/>
  </g>

  <!-- ── CENTER TRUNK ── -->
  <circle cx="100" cy="100" r="12" fill="#0c1804" opacity="0.88"/>
  <circle cx="100" cy="100" r="6"  fill="#08100a" opacity="0.92"/>

  <!-- ── ORGANIC EDGE ── -->
  <circle cx="100" cy="100" r="78" fill="none" filter="url(#sw)"
          stroke="#081404" stroke-width="9" opacity="0.50"/>
</svg>
