    .results-count{font-size:12px;color:var(--gray);margin-bottom:16px}

    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
    .product-card{background:var(--white);border:1px solid var(--border);border-radius:14px;

    .card-icon{width:56px;height:56px;border-radius:12px;background:var(--cream);

  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const brands  = [...document.querySelectorAll('.f-brand:checked')].map(el => el.value);
  const cats    = [...document.querySelectorAll('.f-cat:checked')].map(el => el.value);
  const prices  = [...document.querySelectorAll('.f-price:checked')].map(el => el.value);

  const filtered = PRODUCTS.filter(p => {
    if (!brands.includes(p.brand)) return false;
    if (!cats.includes(p.cat)) return false;
    if (!prices.includes(priceRange(p.price))) return false;
    if (q && !`${p.name} ${p.sku} ${p.desc}`.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('results-count').textContent = `Showing ${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('product-grid');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1">
      <div class="no-results-icon">🔍</div>
      <h3>No products found</h3>
      <p>Try adjusting your filters or search term.</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const color = BRAND_COLORS[p.brand];
    return `<div class="product-card">
      <div class="card-icon">${icon(p.icon, color)}</div>
      <div class="card-badges">
        <span class="badge badge-brand" style="background:${color}">${BRAND_NAMES[p.brand]}</span>
        <span class="badge badge-cat">${CAT_LABELS[p.cat] || p.cat}</span>
      </div>
      <div class="card-name">${p.name}</div>
      <div class="card-sku">${p.sku}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-price-row">
        <span class="card-price">$${p.price.toFixed(2)}</span>
      </div>
      <a class="card-btn" href="${p.url}" target="_blank" rel="noopener">Buy at Ewing →</a>
    </div>`;
  }).join('');
}

function clearFilters() {
  document.querySelectorAll('.f-brand,.f-cat,.f-price').forEach(cb => cb.checked = true);
  document.getElementById('search-input').value = '';
  applyFilters();
}

document.querySelectorAll('.f-brand,.f-cat,.f-price').forEach(cb => cb.addEventListener('change', applyFilters));
applyFilters();
</script>
</body>
</html>
